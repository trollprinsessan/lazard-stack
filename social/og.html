<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OG · The Lazard Stack</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px;
    height: 630px;
    background: white;
    font-family: "Georgia", "Times New Roman", serif;
    color: #040FAA;
    overflow: hidden;
    -webkit-filter: url("#distort");
    filter: url("#distort");
  }
  .frame {
    width: 1200px;
    height: 630px;
    padding: 36px 48px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 12px;
  }
  /* Top bar */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 3px solid #040FAA;
    padding-bottom: 14px;
    font-family: "Courier New", monospace;
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: bold;
  }
  .topbar .kicker { color: #DA0303; }
  .topbar .url { color: #040FAA; }
  /* Title block */
  .title-area {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 22px;
  }
  .title {
    color: #DA0303;
    font-size: 178px;
    font-weight: bold;
    text-transform: uppercase;
    line-height: 0.86;
    letter-spacing: -0.02em;
    position: relative;
    display: inline-block;
  }
  .title::before {
    content: attr(data-text);
    position: absolute;
    top: 4px; left: 5px;
    color: #040FAA;
    opacity: 0.22;
    z-index: -1;
    pointer-events: none;
  }
  .title .bolt {
    color: #FFB800;
    font-family: "Courier New", monospace;
    font-size: 100px;
    vertical-align: middle;
    padding: 0 18px;
    text-shadow: 0 0 12px rgba(255, 184, 0, 0.35);
  }
  .subtitle {
    font-style: italic;
    font-size: 26px;
    line-height: 1.2;
    color: #040FAA;
    max-width: 820px;
  }
  /* Bottom bar */
  .bottombar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-top: 3px solid #040FAA;
    padding-top: 14px;
    font-family: "Courier New", monospace;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #040FAA;
    font-weight: bold;
  }
  .bottombar .left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .bottombar .updated { color: #040FAA; font-style: italic; font-size: 11px; text-transform: none; font-family: "Georgia", serif; }
  .bottombar .right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  .bottombar svg { display: block; }
  .bcode-text { font-size: 11px; letter-spacing: 0.16em; }
</style>
</head>
<body>
<div class="frame">
